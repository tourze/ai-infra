<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{DIAGRAM_TITLE}}</title>
    <style>
      /* === RESET === */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: {{BG_COLOR}};  /* e.g. #f0ece4  or  #e8eef5 */
        color: #2c2c2c;
        padding: 40px 48px;
        min-height: 100vh;
      }

      /* === LEGEND (top-right) === */
      .legend {
        display: flex;
        gap: 24px;
        justify-content: flex-end;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 600;
        color: #555;
      }
      .legend-line {
        width: 40px;
        height: 0;
        border-top: 2.5px solid currentColor;
      }
      .legend-line.dashed { border-top-style: dashed; }
      .legend-line.dotted { border-top-style: dotted; }

      /* === DIAGRAM ROOT === */
      .diagram {
        position: relative;
        width: 100%;
        max-width: {{MAX_WIDTH}};  /* e.g. 1400px */
        margin: 0 auto;
      }
      .diagram-title {
        font-size: 21px;
        font-weight: 700;
        margin-bottom: 28px;
        color: #1a1a1a;
        letter-spacing: -0.3px;
      }

      /* === ZONES === */
      .zone {
        position: relative;
        border: 2px dashed var(--zone-border, #b0896a);
        border-radius: 8px;
        padding: 36px 20px 20px 20px;
        background: var(--zone-bg, rgba(255,255,255,0.25));
      }
      .zone-label {
        position: absolute;
        top: -1px; left: 14px;
        transform: translateY(-50%);
        font-size: 12px;
        font-weight: 700;
        color: var(--zone-label-color, #b0896a);
        background: var(--zone-label-bg, inherit);
        padding: 1px 10px;
        border-radius: 3px;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .zone-content {
        display: grid;
        gap: 16px;
        align-items: start;
      }

      /* Depth presets */
      .zone-depth-0 {
        --zone-border: #9a5b4a;
        --zone-bg: rgba(255,255,255,0.15);
        --zone-label-color: #9a5b4a;
        --zone-label-bg: #ede8e0;
      }
      .zone-depth-1 {
        --zone-border: #c67a2e;
        --zone-bg: rgba(255,255,255,0.20);
        --zone-label-color: #c67a2e;
        --zone-label-bg: #ede8e0;
      }
      .zone-depth-2 {
        --zone-border: #d44a3e;
        --zone-bg: rgba(255,255,255,0.25);
        --zone-label-color: #d44a3e;
        --zone-label-bg: #ede8e0;
      }
      .zone-depth-3 {
        --zone-border: #7a6aad;
        --zone-bg: rgba(255,255,255,0.30);
        --zone-label-color: #7a6aad;
        --zone-label-bg: #e8e4f0;
      }

      /* === NODES === */
      .node {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 6px;
        min-width: 80px;
        max-width: 180px;
      }
      .node-icon {
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--icon-color, #3a3a3a);
        margin-bottom: 2px;
      }
      .node-icon svg { width: 100%; height: 100%; }
      .node-title {
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        color: #1a1a1a;
        line-height: 1.3;
      }
      .node-desc {
        font-size: 10.5px;
        font-weight: 400;
        text-align: center;
        color: #555;
        line-height: 1.35;
        max-width: 160px;
      }

      .node-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }

      /* === CONNECTION OVERLAY === */
      .conn-overlay {
        position: absolute;
        top: 0; left: 0;
        pointer-events: none;
        overflow: visible;
        z-index: 10;
      }
      .conn-overlay path {
        fill: none;
        stroke-width: 2;
        stroke-linejoin: round;
      }
      /* Default connection classes — override colors via legend definitions */
      .conn-overlay .conn-default  { stroke: #0077b6; }
      .conn-overlay .conn-realtime { stroke: #0077b6; }
      .conn-overlay .conn-batch    { stroke: #c74634; stroke-dasharray: 8 5; }
      .conn-overlay .conn-event    { stroke: #2e7d32; }
      .conn-overlay .conn-control  { stroke: #c67a2e; stroke-dasharray: 6 4; }
      .conn-overlay .conn-dashed   { stroke: #6a6a6a; stroke-dasharray: 6 4; }

      .conn-overlay text {
        font-size: 10px;
        font-family: 'Segoe UI', system-ui, sans-serif;
        fill: #666;
        font-weight: 600;
      }

      /* === GRID UTILITIES === */
      .span-2 { grid-column: span 2; }
      .span-3 { grid-column: span 3; }
      .span-full { grid-column: 1 / -1; }
      .self-center { justify-self: center; }
      .self-start { justify-self: start; }
      .self-end { justify-self: end; }
      .align-center { align-self: center; }
    </style>
  </head>
  <body>
    <!-- === LEGEND === -->
    <div class="legend">
      <!-- {{LEGEND_ITEMS}} e.g.:
  <div class="legend-item"><div class="legend-line" style="color:#0077b6;"></div>Real-time / API</div>
  <div class="legend-item"><div class="legend-line dashed" style="color:#c74634;"></div>Batch / SFTP / EDI</div>
  <div class="legend-item"><div class="legend-line" style="color:#2e7d32;"></div>Event-Driven</div>
  -->
    </div>

    <div class="diagram" id="diagram">
      <div class="diagram-title">{{DIAGRAM_TITLE}}</div>

      <!-- === LAYOUT: Main grid with zones and nodes === -->
      <!--
  Three-column integration pattern example:
  <div class="zone-content" style="grid-template-columns: 200px 1fr 200px; gap: 24px; align-items: start;">
    <div class="zone zone-depth-0">Source Systems zone</div>
    <div class="zone zone-depth-0">Integration Platform zone (with nested VCN/Subnet)</div>
    <div class="zone zone-depth-0">Target Systems zone</div>
  </div>

  Node example:
  <div class="node" data-node-id="fusion-hcm">
    <div class="node-icon">SVG_HERE</div>
    <span class="node-title">Fusion HCM</span>
    <span class="node-desc">Core HR, Self Service, Compensation, Benefits, Payroll, Talent</span>
  </div>
  -->

      <!-- === CONNECTION OVERLAY === -->
      <svg class="conn-overlay" id="connOverlay">
        <defs>
          <!-- Arrowhead markers — one per connection color -->
          <marker
            id="ah-blue"
            markerWidth="10"
            markerHeight="8"
            refX="9"
            refY="4"
            orient="auto"
          >
            <path d="M0,0 L10,4 L0,8 L2,4 Z" fill="#0077b6" />
          </marker>
          <marker
            id="ah-red"
            markerWidth="10"
            markerHeight="8"
            refX="9"
            refY="4"
            orient="auto"
          >
            <path d="M0,0 L10,4 L0,8 L2,4 Z" fill="#c74634" />
          </marker>
          <marker
            id="ah-green"
            markerWidth="10"
            markerHeight="8"
            refX="9"
            refY="4"
            orient="auto"
          >
            <path d="M0,0 L10,4 L0,8 L2,4 Z" fill="#2e7d32" />
          </marker>
          <marker
            id="ah-orange"
            markerWidth="10"
            markerHeight="8"
            refX="9"
            refY="4"
            orient="auto"
          >
            <path d="M0,0 L10,4 L0,8 L2,4 Z" fill="#c67a2e" />
          </marker>
          <marker
            id="ah-gray"
            markerWidth="10"
            markerHeight="8"
            refX="9"
            refY="4"
            orient="auto"
          >
            <path d="M0,0 L10,4 L0,8 L2,4 Z" fill="#6a6a6a" />
          </marker>
          <!-- Reverse markers for bidi -->
          <marker
            id="ah-blue-rev"
            markerWidth="10"
            markerHeight="8"
            refX="1"
            refY="4"
            orient="auto"
          >
            <path d="M10,0 L0,4 L10,8 L8,4 Z" fill="#0077b6" />
          </marker>
          <marker
            id="ah-red-rev"
            markerWidth="10"
            markerHeight="8"
            refX="1"
            refY="4"
            orient="auto"
          >
            <path d="M10,0 L0,4 L10,8 L8,4 Z" fill="#c74634" />
          </marker>
          <marker
            id="ah-green-rev"
            markerWidth="10"
            markerHeight="8"
            refX="1"
            refY="4"
            orient="auto"
          >
            <path d="M10,0 L0,4 L10,8 L8,4 Z" fill="#2e7d32" />
          </marker>
          <marker
            id="ah-orange-rev"
            markerWidth="10"
            markerHeight="8"
            refX="1"
            refY="4"
            orient="auto"
          >
            <path d="M10,0 L0,4 L10,8 L8,4 Z" fill="#c67a2e" />
          </marker>
          <marker
            id="ah-gray-rev"
            markerWidth="10"
            markerHeight="8"
            refX="1"
            refY="4"
            orient="auto"
          >
            <path d="M10,0 L0,4 L10,8 L8,4 Z" fill="#6a6a6a" />
          </marker>
        </defs>
      </svg>

      <script>
        // === CONNECTION DEFINITIONS ===
        // type: 'realtime'|'batch'|'event'|'control'|'dashed'|'default' → CSS class + marker color
        // direction: 'forward'|'backward'|'bidi'
        // route: omit for auto-orthogonal | 'straight' for direct line
        // fromSide / toSide: 'left'|'right'|'top'|'bottom' (auto-detected if omitted)
        const connections = [
          // {{CONNECTIONS}}
        ];

        const typeMarker = {
          realtime: "blue",
          batch: "red",
          event: "green",
          control: "orange",
          dashed: "gray",
          default: "blue",
        };

        (function () {
          const svg = document.getElementById("connOverlay");
          const diagram = document.getElementById("diagram");

          function getRect(el) {
            const r = el.getBoundingClientRect(),
              dr = diagram.getBoundingClientRect();
            return {
              x: r.left - dr.left,
              y: r.top - dr.top,
              w: r.width,
              h: r.height,
              cx: r.left - dr.left + r.width / 2,
              cy: r.top - dr.top + r.height / 2,
            };
          }

          // Margin: connection endpoints offset outward from node bounding box
          const CONN_MARGIN = 16;
          function sidePoint(rect, side) {
            switch (side) {
              case "left":
                return { x: rect.x - CONN_MARGIN, y: rect.cy };
              case "right":
                return { x: rect.x + rect.w + CONN_MARGIN, y: rect.cy };
              case "top":
                return { x: rect.cx, y: rect.y - CONN_MARGIN };
              case "bottom":
                return { x: rect.cx, y: rect.y + rect.h + CONN_MARGIN };
              default:
                return { x: rect.cx, y: rect.cy };
            }
          }

          function autoSide(fr, tr) {
            const dx = tr.cx - fr.cx,
              dy = tr.cy - fr.cy;
            if (Math.abs(dx) >= Math.abs(dy))
              return {
                fs: dx > 0 ? "right" : "left",
                ts: dx > 0 ? "left" : "right",
              };
            return {
              fs: dy > 0 ? "bottom" : "top",
              ts: dy > 0 ? "top" : "bottom",
            };
          }

          function render() {
            svg
              .querySelectorAll("path.conn, text.conn-label")
              .forEach((el) => el.remove());
            const dr = diagram.getBoundingClientRect();
            svg.style.width = dr.width + "px";
            svg.style.height = dr.height + "px";
            svg.setAttribute("viewBox", `0 0 ${dr.width} ${dr.height}`);

            // Phase 1: resolve endpoints
            const cds = connections
              .map((c) => {
                const fromEl = document.querySelector(
                  `[data-node-id="${c.from}"]`,
                );
                const toEl = document.querySelector(`[data-node-id="${c.to}"]`);
                if (!fromEl || !toEl) return null;
                const fr = getRect(fromEl),
                  tr = getRect(toEl);
                const auto = autoSide(fr, tr);
                const fs = c.fromSide || auto.fs,
                  ts = c.toSide || auto.ts;
                return {
                  ...c,
                  p1: sidePoint(fr, fs),
                  p2: sidePoint(tr, ts),
                  fr,
                  tr,
                };
              })
              .filter(Boolean);

            // Phase 2: corridor-based lane allocation for orthogonal routing
            // Group connections by quantized midpoint-X (bucket width 150px)
            const buckets = {};
            cds.forEach((cd, i) => {
              if (cd.route === "straight") return;
              if (Math.abs(cd.p2.y - cd.p1.y) < 4) return; // near-horizontal → no vertical segment
              const midX = (cd.p1.x + cd.p2.x) / 2;
              const key = Math.round(midX / 150);
              if (!buckets[key]) buckets[key] = [];
              buckets[key].push(i);
            });

            const laneOff = new Array(cds.length).fill(0);
            Object.values(buckets).forEach((group) => {
              if (group.length <= 1) return;
              // Sort by target Y to minimize crossing of vertical segments
              group.sort((a, b) => cds[a].p2.y - cds[b].p2.y);
              const spacing = 14;
              const total = (group.length - 1) * spacing;
              group.forEach((idx, i) => {
                laneOff[idx] = -total / 2 + i * spacing;
              });
            });

            // Phase 3: render paths
            cds.forEach((cd, i) => {
              const { p1, p2, type, direction, label, route } = cd;

              let d;
              if (route === "straight") {
                d = `M${p1.x},${p1.y} L${p2.x},${p2.y}`;
              } else if (Math.abs(p2.x - p1.x) < 80) {
                // Short-gap (adjacent grid nodes): horizontal at midpoint-Y, edge-to-edge with small clearance
                const SM = 4;
                const x1 = cd.fr.x + cd.fr.w + SM;
                const x2 = cd.tr.x - SM;
                const my = (cd.fr.cy + cd.tr.cy) / 2;
                d = `M${x1},${my} L${x2},${my}`;
              } else if (Math.abs(p2.y - p1.y) < 4) {
                // Near-horizontal: straight line
                d = `M${p1.x},${p1.y} L${p2.x},${p2.y}`;
              } else {
                // Orthogonal H-V-H with lane offset
                const mx = (p1.x + p2.x) / 2 + laneOff[i];
                d = `M${p1.x},${p1.y} L${mx},${p1.y} L${mx},${p2.y} L${p2.x},${p2.y}`;
              }

              const path = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "path",
              );
              path.classList.add("conn", `conn-${type || "default"}`);
              path.setAttribute("d", d);

              const mc = typeMarker[type] || "blue";
              if (direction === "bidi") {
                path.setAttribute("marker-start", `url(#ah-${mc}-rev)`);
                path.setAttribute("marker-end", `url(#ah-${mc})`);
              } else if (direction === "backward") {
                path.setAttribute("marker-start", `url(#ah-${mc}-rev)`);
              } else {
                path.setAttribute("marker-end", `url(#ah-${mc})`);
              }
              svg.appendChild(path);

              if (label) {
                const lx = (p1.x + p2.x) / 2,
                  ly = Math.min(p1.y, p2.y) - 8;
                const txt = document.createElementNS(
                  "http://www.w3.org/2000/svg",
                  "text",
                );
                txt.classList.add("conn-label");
                txt.setAttribute("x", lx);
                txt.setAttribute("y", ly);
                txt.setAttribute("text-anchor", "middle");
                txt.textContent = label;
                svg.appendChild(txt);
              }
            });
          }

          window.addEventListener("DOMContentLoaded", render);
          window.addEventListener("resize", render);
          document.fonts?.ready?.then(render);
        })();
      </script>
    </div>
  </body>
</html>
